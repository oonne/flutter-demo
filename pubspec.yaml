name: flutter_demo
description: "Flutter Demo"
publish_to: 'none'
version: 0.0.3+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  dio: ^5.8.0+1
  dio_http2_adapter: ^2.6.0
  logging: ^1.3.0
  flutter_dotenv: ^6.0.1
  shared_preferences: ^2.5.2
  flutter_svg: ^2.0.17
  mobile_scanner: ^7.2.0
  audioplayers: ^6.4.0
  provider: ^6.1.2
  go_router: ^17.2.3
  board_datetime_picker: ^2.5.0
  package_info_plus: ^10.1.0
  event_bus: ^2.0.1
  device_info_plus: ^13.1.0
  easy_refresh: ^3.4.0
  image_picker: ^1.1.2
  crypto: ^3.0.6
  json_annotation: ^4.9.0
  date_format: ^2.0.9
  flutter_unionad: ^2.2.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - .env.dev
    - assets/audio/
    - assets/icon/
    - assets/img/
  fonts:
    - family: Futura-Heavy
      fonts:
        - asset: assets/font/Futura-Heavy.ttf
    - family: Futura-Medium
      fonts:
        - asset: assets/font/Futura-Medium.ttf
    - family: Futura-Light
      fonts:
        - asset: assets/font/Futura-Light.ttf
